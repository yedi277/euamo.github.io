<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>书签管理后台</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>📚</text></svg>">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);min-height:100vh;color:#e0e0e0}
.container{max-width:1200px;margin:0 auto;padding:20px}
.header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:rgba(255,255,255,.05);border-radius:12px;margin-bottom:20px}
.header h1{font-size:24px;color:#fff}
.header-actions{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;transition:background .2s}
.btn-primary{background:#4f8cff;color:#fff}.btn-primary:hover{background:#3a7bff}
.btn-success{background:#28a745;color:#fff}.btn-success:hover{background:#218838}
.btn-danger{background:#dc3545;color:#fff}.btn-danger:hover{background:#c82333}
.btn-secondary{background:#6c757d;color:#fff}.btn-secondary:hover{background:#5a6268}
.btn:active{transform:scale(.98)}
.tabs{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;background:rgba(255,255,255,.1);border-radius:20px;cursor:pointer;font-size:14px;border:1px solid transparent;transition:background .2s;display:flex;align-items:center;gap:4px;position:relative}
.tab:hover{background:rgba(79,140,255,.3)}
.tab.active{background:#4f8cff;color:#fff;border-color:#3a7bff}
.tab .count{margin-left:6px;opacity:.7}
.tab-delete-btn{background:none;border:none;color:#888;font-size:16px;cursor:pointer;padding:0 2px;margin-left:-14px;opacity:0;transition:opacity .2s,transform .2s,color .2s;line-height:1}
.tab:hover .tab-delete-btn{opacity:1;color:#dc3545}
.tab-delete-btn:hover{color:#ff6b6b;transform:scale(1.2)}
.bookmark-list{display:grid;gap:12px}
.bookmark-item{display:flex;align-items:center;gap:15px;padding:15px;background:rgba(255,255,255,.05);border-radius:10px;border:1px solid transparent;transition:background .2s,border-color .2s,transform .2s}
.bookmark-item:hover{background:rgba(255,255,255,.1);border-color:rgba(79,140,255,.3);transform:translateX(4px)}
.bookmark-item .icon{font-size:24px;width:40px;text-align:center}
.bookmark-item .info{flex:1}
.bookmark-item .name{font-weight:500;color:#fff;margin-bottom:4px;cursor:pointer;transition:color .2s}
.bookmark-item .url{font-size:12px;color:#888;word-break:break-all;cursor:pointer;transition:color .2s}
.bookmark-item .name:hover,.bookmark-item .url:hover{color:#4f8cff}
.bookmark-item .cat-tag{padding:4px 10px;background:rgba(79,140,255,.2);border-radius:12px;font-size:12px;color:#4f8cff}
.bookmark-item .actions{display:flex;gap:8px}
.bookmark-item .actions button{padding:6px 12px;font-size:12px}
.bookmark-item.dragging{opacity:.5;background:rgba(79,140,255,.2)}
.drag-handle{cursor:grab;color:#666;padding:5px;transition:color .2s}
.drag-handle:hover{color:#4f8cff}
.drag-handle:active{cursor:grabbing;color:#3a7bff}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);justify-content:center;align-items:center;z-index:1000}
.modal.show{display:flex}
.modal-content{background:#1e2a3a;border-radius:16px;padding:30px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-content.wide{max-width:600px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-header h2{font-size:20px;color:#fff}
.modal-close{background:none;border:none;color:#888;font-size:24px;cursor:pointer}
.form-group{margin-bottom:20px}
.form-group label{display:block;margin-bottom:8px;color:#aaa;font-size:14px}
.form-group input,.form-group select{width:100%;padding:12px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;font-size:14px;transition:border-color .2s,background .2s,box-shadow .2s}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#4f8cff;background:rgba(255,255,255,.15);box-shadow:0 0 0 3px rgba(79,140,255,.1)}
.form-group select option{background:#1e2a3a}
.empty{text-align:center;padding:60px 20px;color:#666}
.empty-icon{font-size:48px;margin-bottom:16px}
.export-area{margin-top:20px;padding:15px;background:rgba(0,0,0,.3);border-radius:8px}
.export-area pre{white-space:pre-wrap;word-break:break-all;font-size:12px;color:#aaa;max-height:300px;overflow-y:auto}
.import-zone{border:2px dashed #4f8cff;border-radius:12px;padding:40px;text-align:center;cursor:pointer;transition:background .2s}
.import-zone:hover{background:rgba(79,140,255,.1)}
.import-zone.dragover{border-color:#28a745;background:rgba(40,167,69,.1)}
.import-icon{font-size:48px;margin-bottom:10px}
.import-text{color:#fff;margin-bottom:8px}
.import-hint{color:#666;font-size:12px}
.import-desc{color:#aaa;margin-bottom:20px;font-size:14px}
.import-actions{display:flex;gap:10px;margin-top:15px}
.import-actions .btn{flex:1}
.hidden{display:none}
.mt15{margin-top:15px}
.btn-full{width:100%}
.export-hint{margin-bottom:15px;color:#888}
.export-btn{width:100%;margin-top:10px}
.export-btn:first-of-type{margin-top:15px}
.preview-header{display:flex;justify-content:space-between;padding:12px 15px;background:rgba(79,140,255,.2);border-radius:8px 8px 0 0;color:#4f8cff;font-weight:500}
.preview-content{max-height:250px;overflow-y:auto;background:rgba(0,0,0,.2);border-radius:0 0 8px 8px;padding:10px}
.preview-folder{margin:8px 0}
.preview-folder-name{color:#ffc107;font-weight:500;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.preview-folder-name .count{color:#888;font-weight:400;font-size:12px}
.preview-items{padding-left:20px;font-size:13px}
.preview-item{padding:4px 8px;display:flex;align-items:center;gap:8px;border-radius:4px}
.preview-item:hover{background:rgba(255,255,255,.05)}
.preview-item .icon{width:20px;text-align:center}
.preview-item .name{color:#ddd}
.preview-item .url{color:#666;font-size:11px;margin-left:auto;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-item.existing{opacity:.5}
.preview-item.existing .name::after{content:' (已存在)';color:#ffc107;font-size:11px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📚 书签管理后台</h1>
    <div class="header-actions">
      <button class="btn btn-primary" onclick="showAddModal()">+ 添加书签</button>
      <button class="btn btn-success" onclick="showAddCatModal()">+ 新建分类</button>
      <button class="btn btn-secondary" onclick="showImportModal()">导入书签</button>
      <button class="btn btn-secondary" onclick="exportData()">导出数据</button>
      <button class="btn btn-secondary" onclick="exportHTML()">导出HTML</button>
      <button class="btn btn-danger" onclick="clearAllData()">清空数据</button>
    </div>
  </div>

  <div class="tabs" id="categoryTabs"></div>
  <div class="bookmark-list" id="bookmarkList"></div>
</div>

<div class="modal" id="bookmarkModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 id="modalTitle">添加书签</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <form id="bookmarkForm" onsubmit="saveBookmark(event)">
      <input type="hidden" id="editIndex">
      <div class="form-group">
        <label>分类</label>
        <select id="bookmarkCat" required></select>
      </div>
      <div class="form-group">
        <label>网站名称</label>
        <input type="text" id="bookmarkName" required placeholder="例如：百度">
      </div>
      <div class="form-group">
        <label>网站地址</label>
        <input type="url" id="bookmarkUrl" required placeholder="https://www.baidu.com">
      </div>
      <div class="form-group">
        <label>图标 (emoji)</label>
        <input type="text" id="bookmarkIcon" placeholder="例如：🔍" maxlength="2">
      </div>
      <button type="submit" class="btn btn-primary btn-full">保存</button>
    </form>
  </div>
</div>

<div class="modal" id="catModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>新建分类</h2>
      <button class="modal-close" onclick="closeCatModal()">&times;</button>
    </div>
    <form id="catForm" onsubmit="saveCategory(event)">
      <div class="form-group">
        <label>分类名称</label>
        <input type="text" id="catName" required placeholder="例如：工具">
      </div>
      <div class="form-group">
        <label>分类图标 (emoji)</label>
        <input type="text" id="catIcon" placeholder="例如：🔧" maxlength="2">
      </div>
      <button type="submit" class="btn btn-success btn-full">创建分类</button>
    </form>
  </div>
</div>

<div class="modal" id="importModal">
  <div class="modal-content wide">
    <div class="modal-header">
      <h2>导入浏览器书签</h2>
      <button class="modal-close" onclick="closeImportModal()">&times;</button>
    </div>
    <p class="import-desc">
      支持导入 Chrome/Edge/Firefox 等浏览器导出的 HTML 书签文件。<br>
      <strong>步骤：</strong>浏览器书签管理 → 导出书签 → 选择文件导入
    </p>
    <div class="import-zone" id="importZone" onclick="document.getElementById('importFile').click()">
      <div class="import-icon">📂</div>
      <div class="import-text">点击选择书签文件或拖放文件到此处</div>
      <div class="import-hint">支持 .html 格式</div>
    </div>
    <input type="file" id="importFile" accept=".html,.htm" class="hidden" onchange="handleFileSelect(event)">
    <div id="importPreview" class="hidden">
      <div class="preview-header">
        <span>📋 解析结果</span>
        <span id="importStats"></span>
      </div>
      <div class="preview-content" id="previewContent"></div>
      <div class="form-group mt15">
        <label>导入到分类</label>
        <select id="importCategory">
          <option value="new">新建分类（按原文件夹名）</option>
          <option value="existing">导入到现有分类</option>
        </select>
      </div>
      <div id="existingCatSelect" class="hidden form-group">
        <label>选择目标分类</label>
        <select id="targetCategory"></select>
      </div>
      <div class="form-group">
        <label>
          <input type="checkbox" id="skipDuplicate" checked> 跳过已存在的网站（按URL判断）
        </label>
      </div>
      <div class="import-actions">
        <button class="btn btn-primary" onclick="confirmImport()">确认导入</button>
        <button class="btn btn-secondary" onclick="closeImportModal()">取消</button>
      </div>
    </div>
  </div>
</div>

<div class="modal" id="exportModal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>导出数据</h2>
      <button class="modal-close" onclick="closeExportModal()">&times;</button>
    </div>
    <p class="export-hint">复制以下数据替换 .js 中的 bookmarks 数组：</p>
    <div class="export-area">
      <pre id="exportContent"></pre>
    </div>
    <button class="btn btn-primary export-btn" onclick="copyExport()">复制到剪贴板</button>
    <button class="btn btn-success export-btn" onclick="downloadBookmarksJS()">下载 bookmarks.js</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'navBookmarks';
let bookmarks = [];
let currentCat = 'all';
let parsedBookmarks = null;

function loadData() {
  const saved = localStorage.getItem(STORAGE_KEY);
  bookmarks = saved ? JSON.parse(saved) : [{ cat: '默认分类', icon: '📁', items: [] }];
  if (!saved) saveData();
}

function saveData() { localStorage.setItem(STORAGE_KEY, JSON.stringify(bookmarks)); }

function renderTabs() {
  const total = bookmarks.reduce((s, b) => s + b.items.length, 0);
  let html = `<div class="tab ${currentCat === 'all' ? 'active' : ''}" data-cat="all">全部<span class="count">${total}</span></div>`;
  bookmarks.forEach((b, i) => {
    html += `<div class="tab ${currentCat === b.cat ? 'active' : ''}" data-cat="${b.cat}">
      <span>${b.icon} ${b.cat}<span class="count">${b.items.length}</span></span>
      <button class="tab-delete-btn" data-del-cat="${i}">×</button>
    </div>`;
  });
  document.getElementById('categoryTabs').innerHTML = html;
}

function filterByCat(cat) { currentCat = cat; renderTabs(); renderList(); }
function openBookmark(url) { window.open(url, '_blank'); }

function renderList() {
  const list = document.getElementById('bookmarkList');
  const items = [];
  bookmarks.forEach((cat, catIndex) => {
    if (currentCat !== 'all' && currentCat !== cat.cat) return;
    cat.items.forEach((item, itemIndex) => {
      items.push({ cat: cat.cat, catIcon: cat.icon, catIndex, name: item[0], url: item[1], icon: item[2], itemIndex });
    });
  });
  if (items.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>暂无书签</p></div>`;
    return;
  }
  list.innerHTML = items.map(item => `
    <div class="bookmark-item" data-cat="${item.catIndex}" data-item="${item.itemIndex}">
      <span class="drag-handle">⋮⋮</span>
      ${renderIcon(item.icon)}
      <div class="info">
        <div class="name" data-url="${escapeAttr(item.url)}">${item.name}</div>
        <div class="url" data-url="${escapeAttr(item.url)}">${item.url}</div>
      </div>
      <span class="cat-tag">${item.catIcon} ${item.cat}</span>
      <div class="actions">
        <button class="btn btn-primary" data-edit="${item.catIndex},${item.itemIndex}">编辑</button>
        <button class="btn btn-danger" data-delete="${item.catIndex},${item.itemIndex}">删除</button>
      </div>
    </div>
  `).join('');
  initDrag();
}

function escapeAttr(s) { return s.replace(/"/g, '&quot;'); }

function renderIcon(icon) {
  if (!icon) return '<span class="icon">🔗</span>';
  if (icon.startsWith('data:image') || icon.startsWith('http'))
    return `<span class="icon"><img src="${icon}" alt="" style="width:20px;height:20px;object-fit:contain;vertical-align:middle;"></span>`;
  return `<span class="icon">${icon}</span>`;
}

let draggedItem = null;

function initDrag() {
  document.querySelectorAll('.bookmark-item').forEach(item => {
    item.draggable = true;
    item.addEventListener('dragstart', () => { draggedItem = item; item.classList.add('dragging'); });
    item.addEventListener('dragover', e => e.preventDefault());
    item.addEventListener('dragend', () => item.classList.remove('dragging'));
    item.addEventListener('drop', e => {
      e.preventDefault();
      if (item === draggedItem) return;
      const fromCat = +draggedItem.dataset.cat, fromItem = +draggedItem.dataset.item;
      const toCat = +item.dataset.cat, toItem = +item.dataset.item;
      const [moved] = bookmarks[fromCat].items.splice(fromItem, 1);
      bookmarks[toCat].items.splice(toItem, 0, moved);
      saveData(); renderList();
    });
  });
}

function fillCatSelect(selected) {
  document.getElementById('bookmarkCat').innerHTML = bookmarks.map(b =>
    `<option value="${b.cat}" ${b.cat === selected ? 'selected' : ''}>${b.icon} ${b.cat}</option>`
  ).join('');
}

function showAddModal() {
  document.getElementById('modalTitle').textContent = '添加书签';
  document.getElementById('editIndex').value = '';
  document.getElementById('bookmarkName').value = '';
  document.getElementById('bookmarkUrl').value = '';
  document.getElementById('bookmarkIcon').value = '🔗';
  fillCatSelect();
  document.getElementById('bookmarkModal').classList.add('show');
}

function editBookmark(catIndex, itemIndex) {
  const item = bookmarks[catIndex].items[itemIndex];
  document.getElementById('modalTitle').textContent = '编辑书签';
  document.getElementById('editIndex').value = `${catIndex},${itemIndex}`;
  document.getElementById('bookmarkName').value = item[0];
  document.getElementById('bookmarkUrl').value = item[1];
  document.getElementById('bookmarkIcon').value = item[2];
  fillCatSelect(bookmarks[catIndex].cat);
  document.getElementById('bookmarkModal').classList.add('show');
}

function saveBookmark(e) {
  e.preventDefault();
  const editIndex = document.getElementById('editIndex').value;
  const catName = document.getElementById('bookmarkCat').value;
  const name = document.getElementById('bookmarkName').value.trim();
  const url = document.getElementById('bookmarkUrl').value.trim();
  const icon = document.getElementById('bookmarkIcon').value.trim() || '🔗';
  const newItem = [name, url, icon];
  if (editIndex) {
    const [oldCatIdx, oldItemIdx] = editIndex.split(',').map(Number);
    if (bookmarks[oldCatIdx].cat === catName) {
      bookmarks[oldCatIdx].items[oldItemIdx] = newItem;
    } else {
      bookmarks[oldCatIdx].items.splice(oldItemIdx, 1);
      bookmarks.find(b => b.cat === catName).items.push(newItem);
    }
  } else {
    bookmarks.find(b => b.cat === catName).items.push(newItem);
  }
  saveData(); closeModal(); renderTabs(); renderList();
}

function deleteBookmark(catIndex, itemIndex) {
  if (!confirm('确定删除这个书签吗？')) return;
  bookmarks[catIndex].items.splice(itemIndex, 1);
  saveData(); renderTabs(); renderList();
}

function closeModal() { document.getElementById('bookmarkModal').classList.remove('show'); }

function showAddCatModal() {
  document.getElementById('catName').value = '';
  document.getElementById('catIcon').value = '📁';
  document.getElementById('catModal').classList.add('show');
}

function closeCatModal() { document.getElementById('catModal').classList.remove('show'); }

function saveCategory(e) {
  e.preventDefault();
  const name = document.getElementById('catName').value.trim();
  const icon = document.getElementById('catIcon').value.trim() || '📁';
  if (bookmarks.some(b => b.cat === name)) { alert('分类已存在！'); return; }
  bookmarks.push({ cat: name, icon, items: [] });
  saveData(); closeCatModal(); renderTabs(); renderList();
}

function deleteCategory(catIndex) {
  const cat = bookmarks[catIndex];
  if (!confirm(`确定删除分类"${cat.cat}"吗？\n该分类下有 ${cat.items.length} 个书签，删除后无法恢复。`)) return;
  bookmarks.splice(catIndex, 1);
  if (currentCat === cat.cat) currentCat = 'all';
  saveData(); renderTabs(); renderList();
}

function triggerDownload(content, filename, type) {
  const url = URL.createObjectURL(new Blob([content], { type }));
  const a = Object.assign(document.createElement('a'), { href: url, download: filename });
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function exportData() {
  document.getElementById('exportContent').textContent = `const bookmarks = ${JSON.stringify(bookmarks, null, 2)};`;
  document.getElementById('exportModal').classList.add('show');
}

function closeExportModal() { document.getElementById('exportModal').classList.remove('show'); }

function copyExport() {
  navigator.clipboard.writeText(document.getElementById('exportContent').textContent)
    .then(() => alert('已复制到剪贴板！'));
}

function downloadBookmarksJS() {
  triggerDownload(`const bookmarks = ${JSON.stringify(bookmarks, null, 2)};`, 'bookmarks.js', 'text/javascript;charset=utf-8');
}

function exportHTML() {
  const withIcon = confirm('导出 HTML 书签时是否包含图标？\n\n确定 = 包含图标\n取消 = 不包含图标');
  const date = new Date().toISOString().split('T')[0];
  triggerDownload(generateBookmarkHTML(withIcon), `bookmarks_${date}.html`, 'text/html;charset=utf-8');
}

function generateBookmarkHTML(withIcon) {
  const now = new Date().toLocaleString('zh-CN');
  const ts = Math.floor(Date.now() / 1000);
  let html = `<!DOCTYPE NETSCAPE-Bookmark-file-1>
<!-- This is an automatically generated file. -->
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">
<TITLE>书签</TITLE><H1>书签</H1>
<DL><p>
<DT><H3 ADD_DATE="${ts}">个人网址导航</H3>
<DL><p>
`;
  bookmarks.forEach(cat => {
    html += ` <DT><H3 ADD_DATE="${ts}">${cat.cat}</H3>\n <DL><p>\n`;
    cat.items.forEach(([name, url, icon]) => {
      let iconAttr = '';
      if (withIcon && icon) {
        if (icon.startsWith('http://') || icon.startsWith('https://') || icon.startsWith('data:image')) {
          iconAttr = ` ICON="${icon}"`;
        } else if (icon.length <= 2) {
          iconAttr = ` ICON="data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text x="50" y="50" font-size="80" text-anchor="middle" dominant-baseline="middle">${encodeURIComponent(icon)}</text></svg>"`;
        }
      }
      html += ` <DT><A HREF="${url}" ADD_DATE="${ts}"${iconAttr}>${name}</A>\n`;
    });
    html += ` </DL><p>\n`;
  });
  return html + ` </DL><p>\n</DL><p>\n<!-- 导出时间: ${now} -->\n</html>`;
}

function showImportModal() {
  document.getElementById('importModal').classList.add('show');
  document.getElementById('importPreview').classList.add('hidden');
  document.getElementById('importFile').value = '';
  parsedBookmarks = null;
}

function closeImportModal() {
  document.getElementById('importModal').classList.remove('show');
  parsedBookmarks = null;
}

function readFile(file) {
  return new Promise(resolve => {
    const r = new FileReader();
    r.onload = e => resolve(e.target.result);
    r.readAsText(file, 'UTF-8');
  });
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) readFile(file).then(parseBookmarkHTML);
}

function parseBookmarkHTML(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  parsedBookmarks = [];
  function parseDL(dl, folderName = '未分类') {
    dl.querySelectorAll(':scope > dt').forEach(dt => {
      const h3 = dt.querySelector(':scope > h3');
      const a  = dt.querySelector(':scope > a');
      const subDL = dt.querySelector(':scope > dl');
      if (h3) {
        const folder = h3.textContent.trim() || '未分类';
        if (subDL) parseDL(subDL, folder);
      } else if (a) {
        const name = truncateName(a.textContent.trim());
        const url  = a.href;
        const icon = extractIcon(a.getAttribute('icon'), url);
        if (name && url && url !== 'about:blank') {
          let cat = parsedBookmarks.find(c => c.cat === folderName);
          if (!cat) { cat = { cat: folderName, icon: '📁', items: [] }; parsedBookmarks.push(cat); }
          cat.items.push([name, url, icon]);
        }
      }
    });
  }
  parseDL(doc.querySelector('dl') || doc.body, '导入的书签');
  if (parsedBookmarks.length === 0) {
    const cat = { cat: '导入的书签', icon: '📁', items: [] };
    doc.querySelectorAll('a').forEach(a => {
      const name = truncateName(a.textContent.trim());
      const url  = a.href;
      const icon = extractIcon(a.getAttribute('icon'), url);
      if (name && url && url !== 'about:blank') cat.items.push([name, url, icon]);
    });
    if (cat.items.length > 0) parsedBookmarks.push(cat);
  }
  showImportPreview();
}

function truncateName(name, maxLen = 20) {
  if (!name) return '';
  name = name.trim();
  return name.length <= maxLen ? name : name.slice(0, maxLen) + '...';
}

const FAVICON_MAP = {
  'baidu.com':'🔍','google.com':'🌐','github.com':'🐙',
  'youtube.com':'▶️','bilibili.com':'📺','taobao.com':'🛍️',
  'jd.com':'📦','weibo.com':'🐦','zhihu.com':'💬',
  'qq.com':'🐧','163.com':'📧','aliyun.com':'☁️',
  'steam.com':'🎮','douyu.com':'🐠','acfun.cn':'📺'
};

function getFaviconFromUrl(url) {
  try {
    const domain = new URL(url).hostname;
    for (const [key, icon] of Object.entries(FAVICON_MAP)) {
      if (domain.includes(key)) return icon;
    }
  } catch {}
  return '🔗';
}

function extractIcon(iconAttr, url) {
  const icon = iconAttr?.trim();
  if (!icon) return getFaviconFromUrl(url);
  if (icon.startsWith('data:image') || icon.startsWith('http://') || icon.startsWith('https://')) return icon;
  if (/^[\u{1F300}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]$/u.test(icon)) return icon;
  return getFaviconFromUrl(url);
}

function normalizeUrl(url) {
  try { const u = new URL(url); return u.hostname + u.pathname.replace(/\/$/, ''); }
  catch { return url.toLowerCase().replace(/\/$/, ''); }
}

function getExistingUrls() {
  return new Set(bookmarks.flatMap(cat => cat.items.map(item => normalizeUrl(item[1]))));
}

function showImportPreview() {
  const existingUrls = getExistingUrls();
  let totalCount = 0, newCount = 0, duplicateCount = 0, html = '';
  parsedBookmarks.forEach(cat => {
    const newItems = cat.items.filter(item => !existingUrls.has(normalizeUrl(item[1])));
    const dupItems = cat.items.filter(item =>  existingUrls.has(normalizeUrl(item[1])));
    totalCount += cat.items.length; newCount += newItems.length; duplicateCount += dupItems.length;
    const renderItems = (arr, cls = '') => arr.map(item => `
      <div class="preview-item ${cls}">
        ${renderIcon(item[2])}
        <span class="name">${item[0]}</span>
        <span class="url">${item[1]}</span>
      </div>`).join('');
    html += `<div class="preview-folder">
      <div class="preview-folder-name">📁 ${cat.cat} <span class="count">(${cat.items.length}个书签)</span></div>
      <div class="preview-items">${renderItems(newItems)}${renderItems(dupItems, 'existing')}</div>
    </div>`;
  });
  document.getElementById('previewContent').innerHTML = html;
  document.getElementById('importStats').innerHTML =
    `共 ${totalCount} 个书签 | ✅ 新增 ${newCount} 个 | 🟡 重复 ${duplicateCount} 个`;
  document.getElementById('importPreview').classList.remove('hidden');
  document.getElementById('targetCategory').innerHTML = bookmarks.map(b =>
    `<option value="${b.cat}">${b.icon} ${b.cat}</option>`
  ).join('');
  document.getElementById('importCategory').onchange = function() {
    document.getElementById('existingCatSelect').classList.toggle('hidden', this.value !== 'existing');
  };
}

function confirmImport() {
  if (!parsedBookmarks?.length) { alert('没有可导入的书签！'); return; }
  const importMode   = document.getElementById('importCategory').value;
  const skipDuplicate = document.getElementById('skipDuplicate').checked;
  const existingUrls = getExistingUrls();
  let imported = 0;
  if (importMode === 'new') {
    parsedBookmarks.forEach(parsedCat => {
      let target = bookmarks.find(b => b.cat === parsedCat.cat);
      if (!target) { target = { cat: parsedCat.cat, icon: parsedCat.icon, items: [] }; bookmarks.push(target); }
      parsedCat.items.forEach(item => {
        if (skipDuplicate && existingUrls.has(normalizeUrl(item[1]))) return;
        target.items.push(item); imported++;
      });
    });
  } else {
    const target = bookmarks.find(b => b.cat === document.getElementById('targetCategory').value);
    if (!target) { alert('请选择目标分类！'); return; }
    parsedBookmarks.forEach(parsedCat => {
      parsedCat.items.forEach(item => {
        if (skipDuplicate && existingUrls.has(normalizeUrl(item[1]))) return;
        target.items.push(item); imported++;
      });
    });
  }
  saveData(); closeImportModal(); renderTabs(); renderList();
  alert(`导入完成！成功导入 ${imported} 个书签。`);
}

function clearAllData() {
  if (!confirm('⚠️ 确定要清空所有书签数据吗？\n\n此操作不可撤销！')) return;
  if (!confirm('再次确认：真的要删除所有书签吗？')) return;
  bookmarks = []; saveData(); renderTabs(); renderList();
  alert('已清空所有书签数据！');
}

document.getElementById('categoryTabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  const delBtn = e.target.closest('.tab-delete-btn');
  if (delBtn) { e.stopPropagation(); deleteCategory(+delBtn.dataset.delCat); return; }
  if (tab) filterByCat(tab.dataset.cat);
});

document.getElementById('bookmarkList').addEventListener('click', e => {
  const urlEl = e.target.closest('[data-url]');
  const editBtn = e.target.closest('[data-edit]');
  const delBtn  = e.target.closest('[data-delete]');
  if (urlEl)   { openBookmark(urlEl.dataset.url); return; }
  if (editBtn) { const [c, i] = editBtn.dataset.edit.split(',').map(Number); editBookmark(c, i); return; }
  if (delBtn)  { const [c, i] = delBtn.dataset.delete.split(',').map(Number); deleteBookmark(c, i); }
});

document.querySelectorAll('.modal').forEach(modal => {
  modal.addEventListener('click', e => { if (e.target === modal) modal.classList.remove('show'); });
});

const importZone = document.getElementById('importZone');
importZone.addEventListener('dragover', e => { e.preventDefault(); importZone.classList.add('dragover'); });
importZone.addEventListener('dragleave', e => { e.preventDefault(); importZone.classList.remove('dragover'); });
importZone.addEventListener('drop', e => {
  e.preventDefault(); importZone.classList.remove('dragover');
  const file = e.dataTransfer.files[0];
  if (file && /\.html?$/i.test(file.name)) readFile(file).then(parseBookmarkHTML);
  else alert('请选择 HTML 格式的书签文件！');
});

loadData(); renderTabs(); renderList();
</script>
